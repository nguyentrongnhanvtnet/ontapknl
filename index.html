<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quiz App Pro</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 10px;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    #testList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    #quiz {
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    #timer {
      font-weight: bold;
      margin-top: 10px;
    }

    #bar {
      height: 6px;
      background: green;
      width: 0%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>📘 Quiz App Pro</h2>

<div id="testList"></div>

<div id="quiz">
  <div id="question"></div>
  <div id="answers"></div>
  <div id="timer"></div>
  <div id="score"></div>
  <div id="bar"></div>
</div>

<script src="app.js"></script>

</body>
</html>
